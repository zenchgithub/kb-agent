services:
  - type: web
    name: kb-agent
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NAS_BASE_URL
        sync: false
      - key: WEBDAV_USER
        sync: false
      - key: WEBDAV_PASS
        sync: false
      - key: ADMIN_LOOKUP_TABLE
        value: user_admins
      - key: ADMIN_LOOKUP_USER_ID_COLUMN
        value: user_id
