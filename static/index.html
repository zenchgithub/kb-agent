<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Knowledge Agent</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 720px;
            margin: 40px auto;
            padding: 20px;
            background: #0b1020;
            color: #e8ecf7;
        }

        h1 {
            color: #7c9cff;
        }

        #chat {
            background: #121933;
            padding: 20px;
            border-radius: 12px;
            min-height: 200px;
            margin-bottom: 16px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .src {
            color: #56e0c8;
            font-size: 13px;
            margin-top: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            background: #172041;
            color: #e8ecf7;
            border: 1px solid #243056;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #7c9cff;
        }

        .loading {
            color: #9aa3c0;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <h1>Ask your documents</h1>

    <label>
        Supabase access token (Bearer):
        <textarea id="token" placeholder="Paste your ES256 access token here"></textarea>
    </label>

    <div id="chat">Type a question below and press Enter.</div>

    <label>
        Conversation ID (optional; blank for new chat):
        <input id="conversationId" placeholder="e.g. c43c3c23-7ccc-4c9e-95d9-f908611918be" />
    </label>

    <input id="q" placeholder="Type your question" autofocus>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('q');
        const tokenInput = document.getElementById('token');
        const convInput = document.getElementById('conversationId');

        input.addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter' || !input.value.trim()) return;

            const q = input.value;
            const token = tokenInput.value.trim();
            const conversationId = convInput.value.trim() || null;

            if (!token) {
                chat.innerHTML = 'Please paste your Supabase access token first.';
                return;
            }

            chat.innerHTML = `<strong>Q:</strong> ${q}\n\n<span class="loading">Thinking…</span>`;
            input.value = '';

            try {
                const resp = await fetch('/query-stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'accept': 'text/event-stream',
                        'Authorization': 'Bearer ' + token
                    },
                    body: JSON.stringify({ question: q, conversation_id: conversationId })
                });

                if (!resp.ok || !resp.body) {
                    const text = await resp.text();
                    chat.innerHTML = `<strong>Q:</strong> ${q}\n\nError: HTTP ${resp.status}\n${text}`;
                    return;
                }

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let answer = '';
                let sources = [];
                chat.innerHTML = `<strong>Q:</strong> ${q}\n\n`;

                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });

                    // Split on double newline (end of SSE event)
                    let index;
                    while ((index = buffer.indexOf('\n\n')) >= 0) {
                        const chunk = buffer.slice(0, index);
                        buffer = buffer.slice(index + 2);

                        if (!chunk.trim()) continue;

                        const lines = chunk.split('\n');

                        // Handle meta event (conversation_id + sources)
                        if (lines[0].startsWith('event: meta')) {
                            const dataLine = lines.find(l => l.startsWith('data: '));
                            if (dataLine) {
                                try {
                                    const meta = JSON.parse(dataLine.slice(6));
                                    if (meta.conversation_id) {
                                        convInput.value = meta.conversation_id;
                                    }
                                    if (Array.isArray(meta.sources)) {
                                        sources = meta.sources;
                                    }
                                } catch (_) { }
                            }
                            continue;
                        }

                        // Handle data tokens
                        for (const line of lines) {
                            if (!line.startsWith('data: ')) continue;
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.token) {
                                    answer += data.token;
                                    chat.innerHTML = `<strong>Q:</strong> ${q}\n\n${answer}`;
                                }
                            } catch (_) { }
                        }
                    }
                }

                // Render sources after stream completes
                if (sources.length > 0) {
                    const srcText = sources
                        .map(s => `[${s.id}] ${s.source} p.${s.page}`)
                        .join('\n');
                    chat.innerHTML += `\n\n<div class="src">Sources:\n${srcText}</div>`;
                }

            } catch (err) {
                chat.innerHTML = `Error: ${err.message}`;
            }
        });
    </script>
</body>

</html>
